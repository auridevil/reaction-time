<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Reaction Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05070f;
      --border: rgba(255,255,255,0.07);
      --text: #e2e8f6;
      --muted: #4a5478;
      --accent: #6366f1;
      --cyan: #06b6d4;
      --green: #10b981;
      --red: #f43f5e;
      --amber: #f59e0b;
      --purple: #8b5cf6;
    }

    html, body {
      height: 100%; width: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #stars { position: fixed; inset: 0; z-index: 0; }

    .nebula {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 40% at 30% 60%, rgba(99,102,241,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 45% 35% at 70% 30%, rgba(6,182,212,0.05) 0%, transparent 70%);
    }

    .layout {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      height: 100vh;
    }

    /* ── ARENA ── */
    .arena {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px 40px;
      position: relative;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .headline { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    .headline-top {
      font-family: 'Orbitron', monospace;
      font-size: clamp(10px, 1.1vw, 13px); font-weight: 700;
      letter-spacing: 0.35em; color: var(--cyan);
      text-transform: uppercase; opacity: 0.7;
    }

    .headline-main {
      font-family: 'Orbitron', monospace;
      font-size: clamp(22px, 3vw, 34px); font-weight: 900;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, #e2e8f6 0%, #94a3b8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── BUTTON SYSTEM ── */
    .btn-system {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 380px; height: 380px; flex-shrink: 0;
    }

    .orbit {
      position: absolute; border-radius: 50%;
      border: 1px solid transparent; pointer-events: none;
    }
    .orbit-1 {
      width: 100%; height: 100%;
      border-color: rgba(99,102,241,0.12);
      animation: spin 18s linear infinite;
    }
    .orbit-1::after {
      content: ''; position: absolute; top: -3px; left: 50%;
      width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 8px var(--accent); transform: translateX(-50%);
    }
    .orbit-2 {
      width: 82%; height: 82%;
      border-color: rgba(6,182,212,0.10);
      animation: spin 12s linear infinite reverse;
    }
    .orbit-2::after {
      content: ''; position: absolute; bottom: -3px; left: 50%;
      width: 5px; height: 5px; background: var(--cyan); border-radius: 50%;
      box-shadow: 0 0 8px var(--cyan); transform: translateX(-50%);
    }
    .orbit-3 {
      width: 64%; height: 64%;
      border-color: rgba(139,92,246,0.08);
      animation: spin 22s linear infinite;
    }
    .orbit-3::after {
      content: ''; position: absolute; top: 50%; right: -3px;
      width: 4px; height: 4px; background: var(--purple); border-radius: 50%;
      box-shadow: 0 0 6px var(--purple); transform: translateY(-50%);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      position: relative;
      width: 200px; height: 200px; border-radius: 50%;
      border: none; cursor: pointer; outline: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease; z-index: 2;
    }
    .btn:active { transform: scale(0.93); }

    .btn-bg   { position: absolute; inset: 0; border-radius: 50%; transition: all 0.4s ease; }
    .btn-rim  { position: absolute; inset: -2px; border-radius: 50%; transition: all 0.4s ease; }
    .btn-shine {
      position: absolute; inset: 8px; border-radius: 50%;
      background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.12) 0%, transparent 55%);
      pointer-events: none;
    }
    .btn-content {
      position: absolute; inset: 0; border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; user-select: none;
    }
    .btn-icon { font-size: 40px; line-height: 1; transition: all 0.3s ease; filter: drop-shadow(0 0 0px transparent); }
    .btn-text {
      font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); transition: all 0.3s ease;
    }

    .btn.idle .btn-bg {
      background: radial-gradient(circle at 50% 40%, #1e2540 0%, #0d1020 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .btn.idle .btn-rim {
      background: conic-gradient(from 0deg, rgba(99,102,241,0.4), rgba(6,182,212,0.2), rgba(99,102,241,0.4));
      padding: 2px; border-radius: 50%;
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), black calc(100% - 2px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 2px), black calc(100% - 2px));
    }

    .btn.wait .btn-bg {
      background: radial-gradient(circle at 50% 40%, #1a1030 0%, #0a0618 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 60px rgba(139,92,246,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .btn.wait .btn-rim {
      animation: rimSpin 2s linear infinite;
      background: conic-gradient(from 0deg, rgba(139,92,246,0.8) 0deg, transparent 120deg, rgba(139,92,246,0.8) 360deg);
      padding: 2px; border-radius: 50%;
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), black calc(100% - 2px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 2px), black calc(100% - 2px));
    }
    @keyframes rimSpin { to { transform: rotate(360deg); } }
    .btn.wait .btn-icon { filter: drop-shadow(0 0 12px rgba(139,92,246,0.6)); }
    .btn.wait .btn-text { color: rgba(139,92,246,0.7); }

    .btn.go .btn-bg {
      background: radial-gradient(circle at 50% 40%, #064e35 0%, #022518 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 4px rgba(16,185,129,0.5), 0 0 80px rgba(16,185,129,0.35), 0 0 160px rgba(16,185,129,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: goBreath 0.7s ease-in-out infinite;
    }
    @keyframes goBreath {
      0%,100% { box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 4px rgba(16,185,129,0.5), 0 0 80px rgba(16,185,129,0.35), 0 0 160px rgba(16,185,129,0.15), inset 0 1px 0 rgba(255,255,255,0.1); }
      50%      { box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 6px rgba(16,185,129,0.7), 0 0 120px rgba(16,185,129,0.5), 0 0 220px rgba(16,185,129,0.2), inset 0 1px 0 rgba(255,255,255,0.1); }
    }
    .btn.go .btn-rim { opacity: 0; }
    .btn.go .btn-icon { filter: drop-shadow(0 0 20px rgba(16,185,129,0.9)); }
    .btn.go .btn-text { color: rgba(16,185,129,0.9); letter-spacing: 0.35em; }
    .orbit-1, .orbit-2, .orbit-3 { transition: opacity 0.3s; }
    .btn.go ~ .orbit-1, .btn.go ~ .orbit-2, .btn.go ~ .orbit-3 { opacity: 0.3; }

    .btn.early .btn-bg {
      background: radial-gradient(circle at 50% 40%, #4c0519 0%, #1f0209 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 4px rgba(244,63,94,0.5), 0 0 80px rgba(244,63,94,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: earlyShake 0.4s ease;
    }
    @keyframes earlyShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-10px); } 40% { transform: translateX(10px); }
      60% { transform: translateX(-6px); }  80% { transform: translateX(6px); }
    }
    .btn.early .btn-rim { opacity: 0; }
    .btn.early .btn-icon { filter: drop-shadow(0 0 16px rgba(244,63,94,0.8)); }
    .btn.early .btn-text { color: rgba(244,63,94,0.8); }

    /* ── GAUGE ── */
    .gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .gauge-labels {
      display: flex; justify-content: space-between; width: 280px;
      font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    }
    .gauge-track {
      width: 280px; height: 8px; border-radius: 4px;
      background: rgba(255,255,255,0.05); position: relative; overflow: visible;
    }
    .gauge-fill {
      height: 100%; border-radius: 4px; width: 0%;
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.5s ease;
      position: relative;
    }
    .gauge-fill::after {
      content: ''; position: absolute; right: -1px; top: 50%;
      width: 14px; height: 14px; border-radius: 50%;
      background: inherit; transform: translateY(-50%);
      box-shadow: 0 0 12px currentColor;
    }
    .gauge-needle {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 2px; height: 20px; background: white; border-radius: 1px;
      box-shadow: 0 0 6px white;
      transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
      opacity: 0;
    }

    /* ── RESULT ── */
    .result {
      text-align: center; min-height: 100px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
    }
    .result-value {
      font-family: 'Orbitron', monospace;
      font-size: clamp(52px, 8vw, 80px); font-weight: 900;
      letter-spacing: -0.02em; line-height: 1;
      opacity: 0; transform: scale(0.8) translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .result-value.show { opacity: 1; transform: scale(1) translateY(0); }
    .result-ms {
      font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700;
      letter-spacing: 0.25em; color: var(--muted);
      opacity: 0; transform: translateY(4px);
      transition: opacity 0.3s ease 0.15s, transform 0.3s ease 0.15s;
    }
    .result-ms.show { opacity: 1; transform: translateY(0); }
    .result-grade {
      font-size: 13px; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted);
      opacity: 0; transition: opacity 0.3s ease 0.25s;
    }
    .result-grade.show { opacity: 1; }

    /* ── RIPPLE ── */
    .ripple {
      position: absolute; border-radius: 50%;
      border: 2px solid currentColor;
      animation: rippleOut 0.6s ease-out forwards; pointer-events: none;
    }
    @keyframes rippleOut {
      from { width: 200px; height: 200px; opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
      to   { width: 200px; height: 200px; opacity: 0;   transform: translate(-50%,-50%) scale(2.2); }
    }

    /* ── FLASH ── */
    .flash { position: fixed; inset: 0; pointer-events: none; z-index: 60; opacity: 0; }
    .flash.go-flash {
      background: #fff;
      animation: cameraFlash 0.45s ease-out forwards;
    }
    @keyframes cameraFlash { 0%,6% { opacity: 1; } 100% { opacity: 0; } }

    /* ── TOAST ── */
    .toast {
      position: fixed; top: 36px; left: 50%;
      transform: translateX(-50%) translateY(-16px);
      padding: 11px 22px; border-radius: 40px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
      backdrop-filter: blur(20px); opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.early { background: rgba(244,63,94,0.15); border: 1px solid rgba(244,63,94,0.3); color: #fb7185; }
    .toast.new-best { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #fbbf24; }

    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

    /* ── SIDEBAR ── */
    .sidebar {
      border-left: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.015) 100%);
      backdrop-filter: blur(32px);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header {
      padding: 20px 20px 18px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    /* ── SETTINGS BAR ── */
    .settings-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .s-group {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 3px; gap: 3px;
    }
    .s-btn {
      padding: 5px 11px; border: none; border-radius: 6px;
      background: transparent; color: var(--muted);
      font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; cursor: pointer;
      transition: all 0.2s; line-height: 1;
    }
    .s-btn.active {
      background: rgba(99,102,241,0.18);
      color: var(--text);
      box-shadow: 0 0 0 1px rgba(99,102,241,0.3);
    }
    .s-btn:hover:not(.active) { background: rgba(255,255,255,0.05); color: var(--text); }
    .s-btn-emoji { font-size: 14px; line-height: 1; font-family: sans-serif; }

    .sidebar-eyebrow {
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--cyan); margin-bottom: 14px; opacity: 0.8;
    }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .stat {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 14px 10px; position: relative; overflow: hidden;
    }
    .stat::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }
    .stat-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 7px;
    }
    .stat-value {
      font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700;
      letter-spacing: -0.02em; transition: color 0.3s;
    }
    .stat-unit { font-size: 10px; font-weight: 500; color: var(--muted); margin-left: 2px; font-family: 'Inter', sans-serif; }
    .stat.best  .stat-value { color: var(--amber); }
    .stat.avg   .stat-value { color: var(--accent); }
    .stat.count .stat-value { color: var(--purple); }

    /* ── HISTORY ── */
    .history-scroll {
      flex: 1; overflow-y: auto; padding: 16px 18px 14px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .history-label {
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px; opacity: 0.6;
    }
    .history-items { display: flex; flex-direction: column; gap: 5px; }

    .h-item {
      display: flex; flex-direction: column; gap: 5px;
      padding: 9px 12px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px; transition: background 0.2s, border-color 0.2s;
      animation: itemIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .h-item:hover { background: rgba(255,255,255,0.045); border-color: rgba(255,255,255,0.1); }
    @keyframes itemIn {
      from { opacity: 0; transform: translateX(20px) scale(0.97); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }

    .h-main {
      display: grid; grid-template-columns: 24px 1fr 54px 44px;
      align-items: center; gap: 8px;
    }
    .h-rank { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .h-rank-num  { font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700; color: var(--muted); }
    .h-rank-mode { font-size: 10px; line-height: 1; opacity: 0.55; }
    .h-bar-wrap { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
    .h-bar { height: 100%; border-radius: 2px; }
    .h-ms { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700; text-align: right; letter-spacing: -0.02em; }
    .h-tag { font-size: 8px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 5px; border-radius: 5px; text-align: center; }

    .tag-best  { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .tag-great { background: rgba(16,185,129,0.12); color: #34d399; }
    .tag-good  { background: rgba(99,102,241,0.12); color: #818cf8; }
    .tag-ok    { background: rgba(6,182,212,0.10);  color: #22d3ee; }
    .tag-slow  { background: rgba(244,63,94,0.10);  color: #fb7185; }

    .h-name-row { padding-left: 32px; }
    .h-name {
      display: inline-block; font-size: 11px; color: var(--muted);
      cursor: text; outline: none;
      border-bottom: 1px solid transparent;
      min-width: 20px; max-width: 200px;
      white-space: nowrap; overflow: hidden;
      transition: border-color 0.2s, color 0.15s;
      font-style: italic;
    }
    .h-name:focus { border-bottom-color: rgba(99,102,241,0.5); color: var(--text); font-style: normal; }
    .h-name:empty::before { content: attr(data-placeholder); color: var(--muted); opacity: 0.3; }

    .empty { text-align: center; padding: 28px 0; font-size: 12px; color: var(--muted); line-height: 1.8; }

    .btn-clear {
      margin: 0 18px 18px; padding: 10px;
      background: transparent; border: 1px solid var(--border); border-radius: 12px;
      color: var(--muted); font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    .btn-clear:hover { background: rgba(244,63,94,0.07); border-color: rgba(244,63,94,0.25); color: #fb7185; }

    /* ── MEANWHILE ── */
    .meanwhile {
      width: 100%; max-width: 560px;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.5s ease 0.3s, transform 0.5s ease 0.3s;
      pointer-events: none;
    }
    .meanwhile.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .meanwhile-eyebrow {
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--muted); text-align: center; margin-bottom: 12px; opacity: 0.6;
    }
    .mw-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .mw-card {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: 14px; padding: 13px 13px 11px;
      position: relative; overflow: hidden;
      opacity: 0; transform: translateY(10px) scale(0.97);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.2s;
    }
    .mw-card.visible { opacity: 1; transform: translateY(0) scale(1); }
    .mw-card:hover { background: rgba(255,255,255,0.05); }
    .mw-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
    }
    .mw-icon { font-size: 20px; line-height: 1; margin-bottom: 7px; display: block; }
    .mw-value { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 5px; }
    .mw-unit  { font-size: 9px; opacity: 0.65; font-family: 'Inter', sans-serif; font-weight: 500; display: block; margin-top: 1px; }
    .mw-label { font-size: 10px; font-weight: 600; color: var(--muted); line-height: 1.3; }
    .mw-sub   { font-size: 9px; color: var(--muted); opacity: 0.55; margin-top: 2px; font-style: italic; }

    /* ── RESPONSIVE ── */
    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: auto auto; height: auto; min-height: 100vh; }
      .arena { overflow-y: visible; padding: 60px 24px 44px; justify-content: flex-start; }
      html, body { overflow-y: auto; }
      .btn-system { width: 320px; height: 320px; }
      .btn { width: 170px; height: 170px; }
      .sidebar { border-left: none; border-top: 1px solid var(--border); }
      .mw-grid { grid-template-columns: repeat(3, 1fr); }
      .meanwhile { max-width: 100%; }
    }
    @media (max-width: 500px) {
      .arena { padding: 50px 16px 36px; }
      .btn-system { width: 280px; height: 280px; }
      .btn { width: 148px; height: 148px; }
      .btn-icon { font-size: 32px; }
      .result-value { font-size: 56px; }
      .gauge-track, .gauge-labels { width: 240px; }

</head>

<script>
// ── I18N ──────────────────────────────────────────────────────────────────────
const STRINGS = {

    btnRetry:  'RIPROVA',
    btnEarly:  'TROPPO PRESTO',
    msLabel:   'MILLISECONDI',
    grades: { superhuman:'Sovrumano', lightning:'Fulmineo', fast:'Veloce', good:'Buono', slow:'Lento', verySlow:'Molto lento' },
    toastEarly:   'Troppo presto — aspetta il verde!',
    toastBest:    '⚡ Nuovo record personale!',
    eyebrow:      'PRESTAZIONI',

    mw: {

      f1:       { label:'Auto F1 a 320 km/h',  sub:'percorsa in rettilineo',            unit:'m' },
      iss:      { label:'ISS in orbita',        sub:'a 27.600 km/h' },
      light:    { label:'Velocità della luce',  sub:'circonf. Terra = 40.075 km',        unit:'× giri intorno alla Terra' },
      cheetah:  { label:'Ghepardo',             sub:'a tutta velocità (120 km/h)',       unit:'m' },
      boeing:   { label:'Boeing 747',           sub:'in crociera a 900 km/h',           unit:'m' },
      sound:    { label:"Suono nell'aria",      sub:'a 20°C, livello del mare',          unit:'m' },
      cpu:      { label:'CPU a 3 GHz',          sub:'cicli di clock eseguiti',           unit:'cicli' },
      mosquito: { label:'Zanzara',              sub:'frequenza ~600 Hz',                 unit:'battiti' },
    },
  },
  en: {
    headlineTop:  'TEST YOUR',
    headlineMain: 'Reaction Time',
    btnStart:  'TAP TO START',
    btnWait:   'WAIT...',
    btnNow:    'NOW!',
    btnRetry:  'TAP TO RETRY',
    btnEarly:  'TOO EARLY',
    msLabel:   'MILLISECONDS',
    grades: { superhuman:'Superhuman', lightning:'Lightning', fast:'Fast', good:'Good', slow:'Slow', verySlow:'Very Slow' },
    toastEarly:   'Too early — wait for green!',
    toastBest:    '⚡ New personal best!',
    eyebrow:      'PERFORMANCE',
    statBest:     'Best',
    statAvg:      'Average',
    statLast:     'Last',
    statCount:    'Attempts',
    histLabel:    'HISTORY',
    emptyLine1:   'No attempts yet.',
    emptyLine2:   'Hit the button to begin.',
    clearBtn:     'Clear all scores',
    mwEyebrow:    'Meanwhile, in your reaction time…',
    gaugeLabels:  ['Lightning','Fast','Good','Slow'],
    namePlaceholder: '+ name',
    tags: { best:'Best', great:'⚡', good:'Fast', ok:'Good', slow:'Slow' },
    mw: {
      car:      { label:'Car at 100 km/h',      sub:'reaction distance before braking', unit:'m' },
      f1:       { label:'F1 car at 320 km/h',   sub:'traveled on the straight',         unit:'m' },
      iss:      { label:'ISS in orbit',          sub:'at 27,600 km/h' },
      light:    { label:'Speed of light',        sub:'circumference of Earth = 40,075 km', unit:'× around Earth' },
      cheetah:  { label:'Cheetah at top speed',  sub:'full sprint at 120 km/h',          unit:'m' },
      boeing:   { label:'Boeing 747',            sub:'cruising at 900 km/h',             unit:'m' },
      sound:    { label:'Sound in air',          sub:'at 20°C sea level',                unit:'m' },
      cpu:      { label:'CPU at 3 GHz',          sub:'clock cycles executed',            unit:'cycles' },
      mosquito: { label:'Mosquito wing beats',   sub:'~600 Hz buzz frequency',           unit:'flaps' },
    },
  },
};

let lang      = localStorage.getItem('rtLang')      || 'it';
let flashMode = localStorage.getItem('rtFlashMode') || 'flash';

function s(key) { return STRINGS[lang][key] ?? STRINGS.en[key] ?? key; }

// ── SCORES (migrating old plain-number format) ─────────────────────────────
function migrateScores(raw) {
  return raw.map(x => {
    if (typeof x === 'number') return { ms: x, name: '', mode: 'flash' };
    return { mode: 'flash', ...x };   // backfill mode on old objects
  });
}
let scores = migrateScores(JSON.parse(localStorage.getItem('rtScores') || '[]'));

function saveScores() {
  localStorage.setItem('rtScores', JSON.stringify(scores));
}

// ── STARFIELD ─────────────────────────────────────────────────────────────────
(function() {
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  function init() {
    stars = [];
    const n = Math.floor((c.width * c.height) / 5000);
    for (let i = 0; i < n; i++)
      stars.push({ x: Math.random()*c.width, y: Math.random()*c.height,
        r: Math.random()*1.2, a: Math.random(), da:(Math.random()-0.5)*0.004,
        dx:(Math.random()-0.5)*0.06, dy:Math.random()*0.06+0.01 });
  }
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      s.x+=s.dx; s.y+=s.dy; s.a+=s.da;
      if(s.a<0) s.da=Math.abs(s.da);
      if(s.a>1) s.da=-Math.abs(s.da);
      if(s.y>c.height){s.y=0;s.x=Math.random()*c.width;}
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a*0.6})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();init();}); resize(); init(); draw();
})();

// ── AUDIO ─────────────────────────────────────────────────────────────────────
const audio = (function() {
  let ctx;
  function init() { if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)(); }
  function beep(freq,type,dur,vol,delay=0) {
    try {
      init();
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type=type; osc.frequency.setValueAtTime(freq,ctx.currentTime+delay);
      gain.gain.setValueAtTime(vol,ctx.currentTime+delay);
      gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+delay+dur);
      osc.start(ctx.currentTime+delay); osc.stop(ctx.currentTime+delay+dur);
    } catch(e){}
  }
  return {
    start()     { beep(440,'sine',0.08,0.08); },
    go()        { beep(1800,'sine',0.04,0.18); },
    goAudio()   {
      // rising double-beep: clear start signal with no visual flash
      beep(900, 'sine', 0.12, 0.75);
      beep(1350,'sine', 0.12, 0.70, 0.11);
    },
    hit(t)      {
      const f = t<250?1200:t<350?900:t<450?700:500;
      beep(f,'sine',0.15,0.12);
      if(t<300){ beep(f*1.25,'sine',0.1,0.07,0.08); beep(f*1.5,'sine',0.08,0.05,0.16); }
    },
    early()     { beep(220,'sawtooth',0.18,0.08); },
    best()      { [0,0.12,0.24,0.36].forEach((d,i)=>beep([880,1100,1320,1760][i],'sine',0.15,0.09,d)); },
  };
})();

// ── CONFETTI ──────────────────────────────────────────────────────────────────
const confetti = (function() {
  const c = document.getElementById('confetti');
  const ctx = c.getContext('2d');
  let parts = [], raf = null;
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  window.addEventListener('resize', resize); resize();
  function burst(x,y,count=90) {
    const colors=['#10b981','#6366f1','#f59e0b','#8b5cf6','#06b6d4','#f43f5e','#34d399','#fbbf24'];
    for(let i=0;i<count;i++){
      const a=Math.random()*Math.PI*2, sp=Math.random()*12+4;
      parts.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-Math.random()*6,
        rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.25,
        w:Math.random()*10+4, h:Math.random()*5+3,
        color:colors[Math.floor(Math.random()*colors.length)],
        alpha:1, shape:Math.random()>0.4?'rect':'circle' });
    }
    if(!raf) animate();
  }
  function animate() {
    ctx.clearRect(0,0,c.width,c.height);
    parts=parts.filter(p=>p.alpha>0.02);
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.vx*=0.99;
      p.rot+=p.rotV; p.alpha-=0.014;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
      if(p.shape==='rect') ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      else { ctx.beginPath(); ctx.arc(0,0,p.w/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    raf=parts.length?requestAnimationFrame(animate):null;
    if(!raf) ctx.clearRect(0,0,c.width,c.height);
  }
  return { burst };
})();

// ── STATE ─────────────────────────────────────────────────────────────────────
let state     = 'idle';
let waitTimer = null;
let goTime    = null;
let lastT     = null;

// ── DOM REFS ──────────────────────────────────────────────────────────────────
const btn         = document.getElementById('btn');
const btnIcon     = document.getElementById('btnIcon');
const btnText     = document.getElementById('btnText');
const btnSystem   = document.getElementById('btnSystem');
const resultValue = document.getElementById('resultValue');
const resultMs    = document.getElementById('resultMs');
const resultGrade = document.getElementById('resultGrade');
const gaugeFill   = document.getElementById('gaugeFill');
const gaugeNeedle = document.getElementById('gaugeNeedle');
const histItems   = document.getElementById('histItems');
const emptyMsg    = document.getElementById('emptyMsg');
const sBest       = document.getElementById('sBest');
const sAvg        = document.getElementById('sAvg');
const sLast       = document.getElementById('sLast');
const sCount      = document.getElementById('sCount');
const btnClear    = document.getElementById('btnClear');
const toastEarly  = document.getElementById('toastEarly');
const toastBest   = document.getElementById('toastBest');
const flash       = document.getElementById('flash');
const mwEl        = document.getElementById('meanwhile');
const mwGrid      = document.getElementById('mwGrid');

// ── RATING ────────────────────────────────────────────────────────────────────
function rate(t) {
  const g = STRINGS[lang].grades;
  if (t < 180) return { tag:'great', label:g.superhuman, color:'#10b981', gaugePos:2  };
  if (t < 250) return { tag:'great', label:g.lightning,  color:'#10b981', gaugePos:10 };
  if (t < 320) return { tag:'good',  label:g.fast,       color:'#6366f1', gaugePos:36 };
  if (t < 420) return { tag:'ok',    label:g.good,       color:'#06b6d4', gaugePos:65 };
  if (t < 550) return { tag:'slow',  label:g.slow,       color:'#f59e0b', gaugePos:82 };
  return              { tag:'slow',  label:g.verySlow,   color:'#f43f5e', gaugePos:96 };
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(el, dur=1800) {
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ── RIPPLE ────────────────────────────────────────────────────────────────────
function spawnRipple(color) {
  const r = document.createElement('div');
  r.className = 'ripple'; r.style.color = color;
  r.style.position = 'absolute'; r.style.left = '50%'; r.style.top = '50%';
  btnSystem.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

// ── GAME TRANSITIONS ──────────────────────────────────────────────────────────
function toIdle() {
  state = 'idle'; clearTimeout(waitTimer); goTime = null;
  btn.className = 'btn idle';
  btnIcon.textContent = '⚡';
  btnText.textContent = scores.length > 0 ? s('btnRetry') : s('btnStart');
}

function toWait() {
  state = 'wait';
  btn.className = 'btn wait';
  btnIcon.textContent = flashMode === 'audio' ? '🔊' : '👁';
  btnText.textContent = s('btnWait');
  audio.start();
  spawnRipple('rgba(139,92,246,0.5)');
  waitTimer = setTimeout(toGo, 1500 + Math.random() * 4000);
}

function toGo() {
  state = 'go'; goTime = performance.now();
  btn.className = 'btn go';
  btnIcon.textContent = '●';
  btnText.textContent = s('btnNow');

  if (flashMode === 'flash') {
    audio.go();
    flash.className = 'flash go-flash';
    setTimeout(() => { flash.className = 'flash'; }, 500);
  } else {
    audio.goAudio();
  }
}

function toEarly() {
  state = 'early'; clearTimeout(waitTimer);
  btn.className = 'btn early';
  btnIcon.textContent = '✕';
  btnText.textContent = s('btnEarly');
  audio.early();
  toastEarly.textContent = s('toastEarly');
  showToast(toastEarly);
  hideResult();
  setTimeout(toIdle, 1300);
}

function recordHit() {
  const elapsed = Math.round(performance.now() - goTime);
  const allMs   = scores.map(x => x.ms);
  const prevBest = allMs.length ? Math.min(...allMs) : Infinity;
  const isNewBest = elapsed < prevBest;

  scores.unshift({ ms: elapsed, name: '', mode: flashMode });
  if (scores.length > 60) scores.pop();
  saveScores();

  audio.hit(elapsed);
  showResultValue(elapsed);
  updateGauge(elapsed);
  updateMeanwhile(elapsed);
  updateStats();
  renderHistory();

  if (isNewBest && scores.length > 1) {
    audio.best();
    toastBest.textContent = s('toastBest');
    showToast(toastBest, 2200);
    const r = btnSystem.getBoundingClientRect();
    confetti.burst(r.left + r.width/2, r.top + r.height/2, 120);
  }

  btn.className = 'btn idle';
  btnIcon.textContent = '⚡';
  btnText.textContent = s('btnRetry');
  state = 'idle';
}

// ── RESULT DISPLAY ────────────────────────────────────────────────────────────
function showResultValue(t) {
  const { color, label } = rate(t);
  resultValue.textContent = t;
  resultValue.style.color = color;
  resultValue.style.textShadow = `0 0 40px ${color}55`;
  resultMs.textContent = s('msLabel');
  resultGrade.textContent = label;
  resultGrade.style.color = color;
  resultValue.classList.remove('show');
  resultMs.classList.remove('show');
  resultGrade.classList.remove('show');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    resultValue.classList.add('show');
    resultMs.classList.add('show');
    resultGrade.classList.add('show');
  }));
}

function hideResult() {
  resultValue.classList.remove('show');
  resultMs.classList.remove('show');
  resultGrade.classList.remove('show');
  hideMeanwhile();
}

// ── GAUGE ─────────────────────────────────────────────────────────────────────
function updateGauge(t) {
  const { color, gaugePos } = rate(t);
  gaugeFill.style.width = gaugePos + '%';
  gaugeFill.style.background = `linear-gradient(90deg, #10b981 0%, ${color} 100%)`;
  gaugeNeedle.style.left = gaugePos + '%';
  gaugeNeedle.style.opacity = '1';
  gaugeNeedle.style.background = color;
  gaugeNeedle.style.boxShadow = `0 0 8px ${color}`;
}
function resetGauge() { gaugeFill.style.width = '0%'; gaugeNeedle.style.opacity = '0'; }

// ── MEANWHILE ─────────────────────────────────────────────────────────────────
const MW_FACTS = [
  { key:'car',      icon:'🚗', color:'#f59e0b',
    compute(t){ return { value:((100/3.6)*(t/1000)).toFixed(1), unit:'m' }; } },
  { key:'f1',       icon:'🏎️', color:'#ef4444',
    compute(t){ return { value:((320/3.6)*(t/1000)).toFixed(1), unit:'m' }; } },
  { key:'iss',      icon:'🛸', color:'#06b6d4',
    compute(t){ const m=Math.round(7660*(t/1000)); return m>=1000?{value:(m/1000).toFixed(2),unit:'km'}:{value:m,unit:'m'}; } },
  { key:'light',    icon:'💡', color:'#fbbf24',
    compute(t){ return { value:(299792*(t/1000)/40075).toFixed(1), unit: STRINGS[lang].mw.light.unit }; } },
  { key:'cheetah',  icon:'🐆', color:'#f97316',
    compute(t){ return { value:((120/3.6)*(t/1000)).toFixed(1), unit:'m' }; } },
  { key:'boeing',   icon:'✈️', color:'#8b5cf6',
    compute(t){ return { value:((900/3.6)*(t/1000)).toFixed(1), unit:'m' }; } },
  { key:'sound',    icon:'🔊', color:'#10b981',
    compute(t){ return { value:(343*(t/1000)).toFixed(1), unit:'m' }; } },
  { key:'cpu',      icon:'💻', color:'#6366f1',
    compute(t){
      const c=Math.round(3_000_000*t);
      const v=c>=1e9?(c/1e9).toFixed(2)+'B':c>=1e6?(c/1e6).toFixed(0)+'M':c.toLocaleString();
      return { value:v, unit: STRINGS[lang].mw.cpu.unit };
    } },
  { key:'mosquito', icon:'🦟', color:'#84cc16',
    compute(t){ return { value:Math.round(600*(t/1000)), unit: STRINGS[lang].mw.mosquito.unit }; } },
];

function getMeanwhileFacts() {
  const pinned = [MW_FACTS[0], MW_FACTS[3]];
  const rest   = MW_FACTS.filter((_,i)=>i!==0&&i!==3).sort(()=>Math.random()-0.5).slice(0,4);
  return [...pinned,...rest].sort(()=>Math.random()-0.5);
}
let activeFacts = getMeanwhileFacts();

function updateMeanwhile(t_ms) {
  lastT = t_ms;
  activeFacts = getMeanwhileFacts();
  mwGrid.innerHTML = '';
  activeFacts.forEach((fact, i) => {
    const { value, unit } = fact.compute(t_ms);
    const str = STRINGS[lang].mw[fact.key];
    const card = document.createElement('div');
    card.className = 'mw-card';
    card.innerHTML = `
      <span class="mw-icon">${fact.icon}</span>
      <div class="mw-value" style="color:${fact.color}">${value}</div>
      ${unit ? `<span class="mw-unit" style="color:${fact.color}">${unit}</span>` : ''}
      <div class="mw-label">${str.label}</div>
      <div class="mw-sub">${str.sub}</div>
    `;
    mwGrid.appendChild(card);
    setTimeout(() => card.classList.add('visible'), 80 + i * 60);
  });
  mwEl.classList.add('visible');
  setTimeout(() => mwEl.scrollIntoView({ behavior:'smooth', block:'nearest' }), 200);
}
function hideMeanwhile() {
  mwEl.classList.remove('visible');
  mwGrid.querySelectorAll('.mw-card').forEach(c=>c.classList.remove('visible'));
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  if (!scores.length) {
    sBest.textContent = '—'; sAvg.textContent = '—';
    sLast.textContent = '—'; sCount.textContent = '0';
    return;
  }
  const allMs = scores.map(x=>x.ms);
  const best  = Math.min(...allMs);
  const avg   = Math.round(allMs.reduce((a,b)=>a+b,0)/allMs.length);
  sBest.innerHTML  = `${best}<span class="stat-unit">ms</span>`;
  sAvg.innerHTML   = `${avg}<span class="stat-unit">ms</span>`;
  sLast.innerHTML  = `${scores[0].ms}<span class="stat-unit">ms</span>`;
  sCount.textContent = scores.length;
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory() {
  histItems.innerHTML = '';
  if (!scores.length) { histItems.appendChild(emptyMsg); return; }

  const allMs = scores.map(x=>x.ms);
  const best  = Math.min(...allMs);
  const worst = Math.max(...allMs);
  const range = worst - best || 1;
  const tags  = STRINGS[lang].tags;
  const ph    = s('namePlaceholder');

  scores.forEach((score, i) => {
    const t      = score.ms;
    const isBest = (t === best && i === scores.findIndex(x=>x.ms===best));
    const { tag, color } = rate(t);
    const finalTag = isBest ? 'best' : tag;
    const tagLabel = tags[finalTag] ?? '—';
    const barPct   = Math.max(5, Math.round(100 - ((t-best)/range)*92));
    const barColor = { best:'#fbbf24', great:'#10b981', good:'#818cf8', ok:'#22d3ee', slow:'#fb7185' }[finalTag];

    const el = document.createElement('div');
    el.className = 'h-item';
    el.innerHTML = `
      <div class="h-main">
        <span class="h-rank">
          <span class="h-rank-num">${i+1}</span>
          <span class="h-rank-mode">${score.mode === 'audio' ? '🔊' : '📸'}</span>
        </span>
        <div class="h-bar-wrap"><div class="h-bar" style="width:${barPct}%;background:${barColor}"></div></div>
        <span class="h-ms" style="color:${barColor}">${t}</span>
        <span class="h-tag tag-${finalTag}">${tagLabel}</span>
      </div>
      <div class="h-name-row">
        <span class="h-name" contenteditable="true" spellcheck="false"
          data-index="${i}" data-placeholder="${ph}"></span>
      </div>
    `;

    const nameEl = el.querySelector('.h-name');
    nameEl.textContent = score.name || '';

    nameEl.addEventListener('pointerdown', e => e.stopPropagation());
    nameEl.addEventListener('click',       e => e.stopPropagation());
    nameEl.addEventListener('blur', () => {
      const idx = parseInt(nameEl.dataset.index);
      scores[idx].name = nameEl.textContent.trim().slice(0, 30);
      saveScores();
    });
    nameEl.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); nameEl.blur(); }
      if (e.key === 'Escape') { nameEl.textContent = scores[parseInt(nameEl.dataset.index)].name||''; nameEl.blur(); }
    });

    histItems.appendChild(el);
  });
}

// ── APPLY LANGUAGE ────────────────────────────────────────────────────────────
function applyLang() {
  const str = STRINGS[lang];
  document.documentElement.lang = lang;
  document.getElementById('headlineTop').textContent  = str.headlineTop;
  document.getElementById('headlineMain').textContent = str.headlineMain;
  resultMs.textContent = str.msLabel;
  document.getElementById('mwEyebrow').textContent      = str.mwEyebrow;
  document.getElementById('sidebarEyebrow').textContent = str.eyebrow;
  document.getElementById('lBest').textContent  = str.statBest;
  document.getElementById('lAvg').textContent   = str.statAvg;
  document.getElementById('lLast').textContent  = str.statLast;
  document.getElementById('lCount').textContent = str.statCount;
  document.getElementById('histLabel').textContent = str.histLabel;
  btnClear.textContent = str.clearBtn;
  toastEarly.textContent = str.toastEarly;
  toastBest.textContent  = str.toastBest;
  emptyMsg.innerHTML = `${str.emptyLine1}<br>${str.emptyLine2}`;
  const gl = str.gaugeLabels;
  document.getElementById('gL1').textContent = gl[0];
  document.getElementById('gL2').textContent = gl[1];
  document.getElementById('gL3').textContent = gl[2];
  document.getElementById('gL4').textContent = gl[3];
  if (state === 'idle')
    btnText.textContent = scores.length > 0 ? str.btnRetry : str.btnStart;
  renderHistory();
  updateStats();
  if (lastT !== null && mwEl.classList.contains('visible')) updateMeanwhile(lastT);
}

// ── APPLY SETTINGS UI ─────────────────────────────────────────────────────────
function applySettings() {
  document.getElementById('sLangIt').classList.toggle('active', lang === 'it');
  document.getElementById('sLangEn').classList.toggle('active', lang === 'en');
  document.getElementById('sModeFlash').classList.toggle('active', flashMode === 'flash');
  document.getElementById('sModeAudio').classList.toggle('active', flashMode === 'audio');
}

// ── SETTINGS HANDLERS ─────────────────────────────────────────────────────────
document.getElementById('sLangIt').addEventListener('click', () => {
  if (lang === 'it') return;
  lang = 'it'; localStorage.setItem('rtLang', lang);
  applySettings(); applyLang();
});
document.getElementById('sLangEn').addEventListener('click', () => {
  if (lang === 'en') return;
  lang = 'en'; localStorage.setItem('rtLang', lang);
  applySettings(); applyLang();
});
document.getElementById('sModeFlash').addEventListener('click', () => {
  if (flashMode === 'flash') return;
  flashMode = 'flash'; localStorage.setItem('rtFlashMode', flashMode);
  applySettings();
});
document.getElementById('sModeAudio').addEventListener('click', () => {
  if (flashMode === 'audio') return;
  flashMode = 'audio'; localStorage.setItem('rtFlashMode', flashMode);
  applySettings();
});

// ── INPUT ─────────────────────────────────────────────────────────────────────
function handlePress(e) {
  e.preventDefault();
  if (state === 'idle') return toWait();
  if (state === 'wait') return toEarly();
  if (state === 'go')   return recordHit();
}
btn.addEventListener('pointerdown', handlePress);

btnClear.addEventListener('click', () => {
  if (!scores.length) return;
  scores = []; saveScores();
  updateStats(); renderHistory(); hideResult(); resetGauge(); toIdle();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
applySettings();
applyLang();
</script>
</body>
</html>
